name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Build NWNWiki data pack
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm import:nwnwiki -- --delay-ms 150

      - name: Build Windows installer
        run: pnpm dist:win
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SCRIBE ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/latest.yml
            dist/*.exe
            dist/*.blockmap
          body: |
            SCRIBE ${{ github.ref_name }}

            This release includes the Windows installer and electron-updater metadata used by installed SCRIBE clients.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
